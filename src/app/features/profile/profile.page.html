<ion-content [fullscreen]="true" class="profile-content">
  <div class="speed-page-header"><h1>{{ 'profile.myAccount' | t }}</h1></div>

  <div class="profile-card">
    <div class="avatar"><ion-icon name="person-circle-outline"></ion-icon></div>
    <h2>{{ user?.full_name || ('home.user' | t) }}</h2>
    <p>{{ user?.email }}</p>
    <p class="phone" *ngIf="user?.phone">{{ user?.phone }}</p>
  </div>

  <div class="menu-section">
    <button class="menu-item" *ngFor="let item of menuItems" (click)="item.action()">
      <div class="menu-icon"><ion-icon [name]="item.icon"></ion-icon></div>
      <span class="menu-label">{{ item.labelKey | t }}</span>
      <ion-icon name="chevron-forward-outline" class="menu-arrow"></ion-icon>
    </button>
  </div>

  <div class="settings-section">
    <div class="settings-row">
      <span><ion-icon name="language-outline"></ion-icon>{{ 'profile.language' | t }}</span>
      <div class="lang-switch">
        <button [class.active]="lang.lang() === 'en'" (click)="setLang('en')">EN</button>
        <button [class.active]="lang.lang() === 'ar'" (click)="setLang('ar')">AR</button>
      </div>
    </div>
    <div class="settings-row">
      <span><ion-icon name="moon-outline"></ion-icon>{{ 'profile.darkMode' | t }}</span>
      <ion-toggle [(ngModel)]="darkMode"></ion-toggle>
    </div>
    <div class="settings-row">
      <span><ion-icon name="notifications-outline"></ion-icon>{{ 'profile.notifications' | t }}</span>
      <ion-toggle [(ngModel)]="notifications"></ion-toggle>
    </div>
  </div>

  <div class="logout-section">
    <button class="logout-btn" (click)="logout()">
      <ion-icon name="log-out-outline"></ion-icon>
      {{ 'profile.logout' | t }}
    </button>
  </div>

  <p class="version">{{ 'profile.appVersion' | t }} 1.0.0</p>
  <div style="height: 100px;"></div>
</ion-content>
